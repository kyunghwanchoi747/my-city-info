name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 22 * * *'   # 한국시간 아침 7시: 공공데이터 글
    - cron: '0 3 * * *'    # 한국시간 낮 12시: 뉴스 브리핑
    - cron: '0 9 * * *'    # 한국시간 저녁 6시: 재건축 해설 글
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Fetch Public Data script
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 22 * * *'
        run: node scripts/fetch-public-data.js
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Run Generate Blog Post script
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 22 * * *'
        run: node scripts/generate-blog-post.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

      - name: Run Fetch Seongnam News script
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 3 * * *'
        run: node scripts/fetch-seongnam-news.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

      - name: Run Generate Redevelopment Post script
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 9 * * *'
        run: node scripts/generate-redev-post.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

      - name: Run Fetch Naver Trends script
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 9 * * *'
        run: node scripts/fetch-naver-trends.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

      - name: Commit and Push changes
        if: github.event_name != 'push'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add .
            git commit -m "자동 업데이트: 공공데이터 수집 및 블로그 글 생성"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Build project
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy out --project-name=my-city-info
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
